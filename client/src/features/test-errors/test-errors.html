<div class="flex jsut gap-3 pt-10">
    <button class="btn btn-neutral" (click)="getError('badRequest')">400</button>
    <button class="btn btn-primary" (click)="getError('not-found')">404</button>
    <button class="btn btn-secondary" (click)="getError('auth')">401</button>
    <button class="btn btn-error" (click)="getError('server-error')">500</button>
    <button class="btn btn-accent" (click)="get400ValidationError()">400</button>
</div>

@if(validationErrors().length > 0){
    <div class="card bg-base-100 flex mt-5 rounded-2xl w-1/2 p-3 mx-auto">
        <ul class="flex flex-col text-red-600 space-y-2">
            @for (err of validationErrors(); track $index) {
                <li>{{err}}</li>
            }

        </ul>

    </div>
}
